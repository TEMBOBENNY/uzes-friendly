<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>File Viewer — UZES</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #f4f4f4; font-family: sans-serif; }
    #viewer { width: 100%; height: 100vh; border: none; display: block; }
    #img-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; box-sizing: border-box; }
    #img-wrap img { max-width: 100%; max-height: 96vh; object-fit: contain; border-radius: 6px; box-shadow: 0 2px 16px rgba(0,0,0,.15); }
    #err { text-align: center; padding: 20vh 24px; color: #666; font-size: 15px; }
    #dl-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; gap: 14px; padding: 24px; box-sizing: border-box; }
    #dl-wrap p { color: #666; font-size: 14px; margin: 0; text-align: center; }
    #dl-link { background: #0055a5; color: #fff; text-decoration: none; padding: 11px 26px; border-radius: 8px; font-size: 15px; font-weight: 600; }
  </style>
</head>
<body>
<script src="js/view.js"></script>
</body>
</html>
