name: Environment Check (Capacitor)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify Node & npm
        run: |
          node -v
          npm -v

      - name: Install dependencies
        run: npm ci

      - name: Verify Capacitor CLI
        run: npx cap --version